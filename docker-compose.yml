# ============================================================================
# Docker Compose Configuration for Trading Strategies
# ============================================================================
# This orchestrates both nautilus_AItrader and GoldArb strategies along with
# supporting services (Redis, PostgreSQL).
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f aitrader   # View logs for specific service
#   docker-compose down               # Stop all services
#   docker-compose restart aitrader   # Restart specific service
# ============================================================================

version: '3.8'

# ============================================================================
# Services
# ============================================================================
services:

  # --------------------------------------------------------------------------
  # Redis - Cache and Message Broker
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nautilus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - trading_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # --------------------------------------------------------------------------
  # PostgreSQL - Data Persistence (Optional)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: nautilus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nautilus
      POSTGRES_USER: nautilus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nautilus"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - trading_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # --------------------------------------------------------------------------
  # nautilus_AItrader - DeepSeek AI Strategy on Binance
  # --------------------------------------------------------------------------
  aitrader:
    build:
      context: /home/ubuntu/nautilus_deepseek
      dockerfile: Dockerfile
    container_name: nautilus-aitrader
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - /home/ubuntu/nautilus_deepseek/.env
    environment:
      # Override with Docker environment
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=nautilus
      - AUTO_CONFIRM=true
      # Strategy will use .env file for API keys and other configs
    volumes:
      # Mount logs directory for persistence
      - /home/ubuntu/nautilus_deepseek/logs:/app/logs
      # Mount data directory (optional, for storing historical data)
      - /home/ubuntu/nautilus_deepseek/data:/app/data
      # Mount configs if you want to update without rebuild (optional)
      # - /home/ubuntu/nautilus_deepseek/configs:/app/configs:ro
    networks:
      - trading_network
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # GoldArb - PAXG-XAUT Grid Strategy on Bybit
  # --------------------------------------------------------------------------
  goldarb:
    build:
      context: /home/ubuntu/GoldArb
      dockerfile: Dockerfile
    container_name: nautilus-goldarb
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - /home/ubuntu/GoldArb/.env
    environment:
      # Override with Docker environment
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=nautilus
    volumes:
      # Mount logs directory for persistence
      - /home/ubuntu/GoldArb/logs:/app/logs
      # Mount data directory (optional)
      - /home/ubuntu/GoldArb/data:/app/data
    networks:
      - trading_network
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================================
# Networks
# ============================================================================
networks:
  trading_network:
    external: true
    name: nautilus-trading-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  redis_data:
    name: nautilus-redis-data
    driver: local
  postgres_data:
    name: nautilus-postgres-data
    driver: local
